<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday!</title>
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; background: #ffdef2; text-align: center; overflow-x: hidden; }
        .hidden { display: none !important; }
        #welcome-screen { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #fff; }
        button { padding: 15px 35px; font-size: 22px; background: #ff4bb4; color: white; border: none; border-radius: 50px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        #popup { padding: 50px 20px; }
        h1 { color: #d63384; font-size: 2.5rem; }
        #cake { width: 250px; cursor: pointer; border-radius: 20px; margin-top: 20px; }
        .heart { position: fixed; top: -10%; font-size: 25px; animation: fall linear forwards; z-index: 999; }
        @keyframes fall { to { transform: translateY(110vh); } }
        .container { max-width: 600px; margin: auto; padding: 20px; }
        video { width: 100%; border-radius: 15px; margin: 20px 0; background: #000; }
        .final-img { width: 100%; border-radius: 20px; border: 5px solid white; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

    <div id="welcome-screen">
        <h2 style="color: #ff4bb4;">You have a surprise!</h2>
        <button onclick="startSurprise()">Open Your Gift 🎁</button>
    </div>

    <div id="popup" class="hidden">
        <h1 id="wish-title">Happy Birthday! ❤️</h1>
        <div id="cake-section">
            <p>Click the cake to cut it!</p>
            <img src="IMG-20260328-WA0004.jpg" id="cake" onclick="cutCake()" alt="Cake">
        </div>
    </div>

    <div id="main-content" class="hidden">
        <div class="container">
            <h3>Our Memories ✨</h3>
            <video id="wish-video" controls>
                <source src="wishes.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
            
            <div id="final-section" style="margin-top: 40px;">
                <img src="together.jpg" class="final-img" alt="Together">
                <h1 style="color: red; font-size: 3rem;">I Love You! ♾️</h1>
            </div>
        </div>
    </div>

    <audio id="bg-music" loop>
        <source src="birthday_song.mp3" type="audio/mpeg">
    </audio>

    <script>
        const bgMusic = document.getElementById('bg-music');
        
        function startSurprise() {
            document.getElementById('welcome-screen').classList.add('hidden');
            document.getElementById('popup').classList.remove('hidden');
            
            // සින්දුව Play කිරීම
            bgMusic.play().catch(e => console.log("Audio play error:", e));

            // AI Voice (English)
            const msg = new SpeechSynthesisUtterance();
            msg.text = "Happy Birthday my love. I have a small surprise for you. You mean the world to me!";
            msg.rate = 0.9;
            window.speechSynthesis.speak(msg);
        }

        function cutCake() {
            document.getElementById('cake-section').classList.add('hidden');
            document.getElementById('main-content').classList.remove('hidden');
            // හාර්ට් වැටීම ආරම්භය
            setInterval(createHeart, 300);
        }

        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 2 + 3 + 's';
            document.body.appendChild(heart);
            setTimeout(() => { heart.remove(); }, 5000);
        }
    </script>
</body>
</html>
